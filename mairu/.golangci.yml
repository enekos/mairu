# https://golangci-lint.run/usage/configuration/
version: "2"

linters:
  # Match golangci default preset when no config file is present (not `all`).
  default: standard
  # errcheck requires checking or assigning every error return; this codebase
  # intentionally ignores many benign cases (defer Close, HTTP handlers, etc.).
  disable:
    - errcheck
  # Do not set staticcheck `checks: [all]` — that enables ST1000/ST1003 across the repo.
  # Instead, silence only the noisy quickfix suggestions (same as before this config file).
  exclusions:
    rules:
      - linters:
          - staticcheck
        text: "QF1002:"
      - linters:
          - staticcheck
        text: "QF1003:"
      - linters:
          - staticcheck
        text: "QF1012:"
