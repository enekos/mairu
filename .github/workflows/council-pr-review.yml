name: Council PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: council-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-council-review') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        reviewer:
          - architect
          - security
          - performance
          - maintainer

    steps:
      - name: Check out PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff "origin/${{ github.base_ref }}...HEAD" > /tmp/pr.diff || true
          DIFF_LEN=$(wc -c < /tmp/pr.diff)
          echo "diff_bytes=$DIFF_LEN" >> "$GITHUB_OUTPUT"
          if [ "$DIFF_LEN" -gt 60000 ]; then
            head -c 60000 /tmp/pr.diff > /tmp/pr.trimmed.diff
            echo "" >> /tmp/pr.trimmed.diff
            echo "... [diff truncated: $DIFF_LEN bytes total]" >> /tmp/pr.trimmed.diff
            mv /tmp/pr.trimmed.diff /tmp/pr.diff
          fi

      - name: Load persona and guidelines
        id: context
        run: |
          PERSONA_FILE=".github/review-council/reviewers/${{ matrix.reviewer }}.md"
          if [ ! -f "$PERSONA_FILE" ]; then
            echo "Persona file not found: $PERSONA_FILE" >&2
            exit 1
          fi

          GUIDELINES=$(cat .github/review-council/guidelines/*.md 2>/dev/null || echo "No guidelines found.")
          PERSONA=$(cat "$PERSONA_FILE")
          DIFF=$(cat /tmp/pr.diff)

          {
            echo "You are a member of a code review council. Review the following pull request diff according to your persona and the project guidelines provided."
            echo ""
            echo "## YOUR PERSONA"
            echo ""
            echo "$PERSONA"
            echo ""
            echo "## PROJECT GUIDELINES"
            echo ""
            echo "$GUIDELINES"
            echo ""
            echo "## PR DIFF"
            echo '```diff'
            echo "$DIFF"
            echo '```'
            echo ""
            echo "Produce your review in the exact output format specified in your persona."
          } > /tmp/prompt.txt

      - name: Call Kimi API
        id: kimi
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: |
          if [ -z "$KIMI_API_KEY" ]; then
            echo "review_output=❌ **KIMI_API_KEY not configured.** Please add it to repository secrets." > "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 .github/review-council/scripts/build_payload.py

          URL="https://api.moonshot.cn/v1/chat/completions"

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${KIMI_API_KEY}" \
            -d @/tmp/payload.json)

          if [ "$HTTP_STATUS" -ne 200 ]; then
            ERROR_BODY=$(cat /tmp/response.json | head -c 500)
            {
              echo "review_output<<REVIEW_EOF"
              echo "❌ **Kimi API Error (HTTP $HTTP_STATUS).** Response: $ERROR_BODY"
              echo "REVIEW_EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REVIEW=$(python3 .github/review-council/scripts/parse_response.py)

          {
            echo "review_output<<REVIEW_EOF"
            echo "$REVIEW"
            echo "REVIEW_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Save review artifact
        run: |
          mkdir -p /tmp/reviews
          echo "${{ steps.kimi.outputs.review_output }}" > "/tmp/reviews/${{ matrix.reviewer }}.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-${{ matrix.reviewer }}
          path: /tmp/reviews/${{ matrix.reviewer }}.md

  aggregate:
    needs: review
    if: ${{ always() && !contains(github.event.pull_request.labels.*.name, 'skip-council-review') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR
        uses: actions/checkout@v4

      - name: Download all review artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/reviews
          pattern: review-*

      - name: Build aggregated comment
        id: build
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          COMMIT_SHA=${{ github.event.pull_request.head.sha }}
          SHORT_SHA=${COMMIT_SHA:0:7}

          {
            echo "<!-- council-pr-review -->"
            echo "<!-- This comment is auto-generated by the Council PR Review workflow. Do not edit manually. -->"
            echo "# 🏛️ Council PR Review"
            echo ""
            echo "**PR:** #${PR_NUM} · **Commit:** \`${SHORT_SHA}\` · **Generated at:** $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "---"
            echo ""
          } > /tmp/comment.md

          for reviewer in architect security performance maintainer; do
            FILE="/tmp/reviews/review-${reviewer}/${reviewer}.md"
            if [ -f "$FILE" ]; then
              cat "$FILE" >> /tmp/comment.md
              echo "" >> /tmp/comment.md
              echo "---" >> /tmp/comment.md
              echo "" >> /tmp/comment.md
            else
              echo "## ⚠️ ${reviewer} review unavailable" >> /tmp/comment.md
              echo "" >> /tmp/comment.md
              echo "The review artifact was not produced (job may have failed or been skipped)." >> /tmp/comment.md
              echo "" >> /tmp/comment.md
              echo "---" >> /tmp/comment.md
              echo "" >> /tmp/comment.md
            fi
          done

          echo "*Want to customize the council? Edit files in \`.github/review-council/\`.*" >> /tmp/comment.md

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          REPO="${{ github.repository }}"

          EXISTING_COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" --paginate \
            -q '.[] | select(.body | contains("<!-- council-pr-review -->")) | .id')

          # Build JSON payload from file to safely handle newlines and quotes
          jq -n --rawfile body /tmp/comment.md '{body: $body}' > /tmp/comment.json

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            echo "Updating existing comment $EXISTING_COMMENT_ID"
            gh api "repos/${REPO}/issues/comments/${EXISTING_COMMENT_ID}" \
              --method PATCH \
              --input /tmp/comment.json
          else
            echo "Creating new council comment"
            gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
              --input /tmp/comment.json
          fi
