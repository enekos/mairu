name: Mairu Agent

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  push:
    branches-ignore: [main, master]
    paths:
      - 'mairu/**'
      - '.github/workflows/mairu-agent.yml'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-agent:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'agent-fix')) ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/mairu'))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MEILI_URL: http://localhost:7700
      MEILI_API_KEY: test_key_for_ci
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    services:
      meilisearch:
        image: getmeili/meilisearch:v1.12
        env:
          MEILI_NO_ANALYTICS: true
          MEILI_MASTER_KEY: "test_key_for_ci"
        ports:
          - 7700:7700

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'mairu/go.mod'
          cache-dependency-path: 'mairu/go.sum'

      - name: Build Mairu
        run: |
          cd mairu
          go build -o ../mairu_bin ./cmd/mairu
          sudo mv ../mairu_bin /usr/local/bin/mairu

      - name: Ingest Codebase
        run: mairu daemon .. -P default
        working-directory: mairu

      - name: Configure Git User
        run: |
          git config --global user.name "Mairu Agent"
          git config --global user.email "agent@mairu.local"

      - name: Run Mairu on Issue
        if: github.event.issue != null && github.event.issue.pull_request == null
        run: |
          mairu minion --github-issue ${{ github.event.issue.number }} "Address the issue described."
        working-directory: mairu

  pr-reviewer-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MEILI_URL: http://localhost:7700
      MEILI_API_KEY: test_key_for_ci
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    services:
      meilisearch:
        image: getmeili/meilisearch:v1.12
        env:
          MEILI_NO_ANALYTICS: true
          MEILI_MASTER_KEY: "test_key_for_ci"
        ports:
          - 7700:7700

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'mairu/go.mod'
          cache-dependency-path: 'mairu/go.sum'

      - name: Build Mairu
        run: |
          cd mairu
          go build -o ../mairu_bin ./cmd/mairu
          sudo mv ../mairu_bin /usr/local/bin/mairu

      - name: Resolve PR for pushed branch
        id: pr
        run: |
          PR_NUMBER="$(gh pr list --repo "${{ github.repository }}" --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number')"
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No open PR found for branch '${{ github.ref_name }}'; skipping reviewer."
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Found PR #$PR_NUMBER for branch '${{ github.ref_name }}'."

      - name: Start tree-sitter daemon ingestion
        if: steps.pr.outputs.found == 'true'
        run: mairu daemon .. -P default
        working-directory: mairu

      - name: Run Minion PR Reviewer Council
        if: steps.pr.outputs.found == 'true'
        run: |
          mairu minion --pr-review-only --github-pr "${{ steps.pr.outputs.number }}"
        working-directory: mairu

      - name: Run Mairu on PR Comment
        if: github.event.issue != null && github.event.issue.pull_request != null
        run: |
          # Checkout the PR branch
          gh pr checkout ${{ github.event.issue.number }}
          mairu minion --github-pr ${{ github.event.issue.number }} "Address the feedback in the comments."
        working-directory: mairu
