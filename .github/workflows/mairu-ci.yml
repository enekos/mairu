name: Mairu CI

on:
  push:
    branches: [master, main]
    paths:
      - 'mairu/**'
      - 'Makefile'
      - 'scripts/**'
      - '.githooks/**'
      - '.github/workflows/mairu-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'mairu/**'
      - 'Makefile'
      - 'scripts/**'
      - '.githooks/**'
      - '.github/workflows/mairu-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev libgtk-3-dev && (sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev)

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: mairu/go.mod
          cache-dependency-path: mairu/go.sum

      - name: Download Go dependencies
        run: go -C mairu mod download

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run Go format check
        run: make fmt-go-check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: mairu
          args: ./...

      - name: Run Go tests with race detector
        run: make test-go-race

      - name: Run replaced module tests
        run: go -C mairu/generative-ai-go-patch test ./...

      - name: Install UI dependencies
        run: bun install --cwd mairu/ui

      - name: Run UI type checks
        run: bun run --cwd mairu/ui check

      - name: Build UI
        run: bun run --cwd mairu/ui build

      - name: Build Go binaries
        run: go -C mairu build -v ./...
