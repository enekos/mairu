<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 0;
      margin: 0;
      background: #f9fafb;
      color: #111827;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }
    .logo { font-weight: 700; font-size: 15px; color: #2563eb; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #6b7280;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
    }
    .dot.ok { background: #10b981; }
    .dot.err { background: #ef4444; }

    .section { padding: 10px 14px; border-bottom: 1px solid #e5e7eb; background: #fff; }
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .stat-card {
      background: #f3f4f6;
      border-radius: 6px;
      padding: 6px 8px;
      text-align: center;
    }
    .stat-card .num { font-size: 18px; font-weight: 700; color: #1f2937; line-height: 1.2; }
    .stat-card .lbl { font-size: 10px; color: #6b7280; margin-top: 2px; }

    input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #2563eb; }

    .results-list { margin-top: 6px; max-height: 160px; overflow-y: auto; }
    .result-item {
      padding: 6px 8px;
      border-radius: 5px;
      cursor: pointer;
      line-height: 1.4;
    }
    .result-item:hover { background: #f3f4f6; }
    .result-item .title { font-weight: 500; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-item .url { font-size: 11px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-item .snippet { font-size: 11px; color: #4b5563; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .empty { color: #9ca3af; font-size: 12px; text-align: center; padding: 8px 0; }

    details summary { cursor: pointer; font-size: 12px; color: #4b5563; user-select: none; }
    details summary::-webkit-details-marker { color: #9ca3af; }
    .settings-inner { margin-top: 8px; display: flex; gap: 6px; align-items: center; }
    .settings-inner label { font-size: 11px; color: #6b7280; white-space: nowrap; }
    .settings-inner input { flex: 1; font-size: 11px; padding: 5px 8px; }
    .btn-save {
      padding: 5px 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
    }
    .btn-save:hover { background: #1d4ed8; }

    .actions { padding: 10px 14px; background: #fff; }
    .btn-sync {
      width: 100%;
      padding: 8px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-sync:hover { background: #1d4ed8; }
    .btn-sync:disabled { background: #93c5fd; cursor: default; }

    .toast {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .health { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px 6px; padding: 8px 14px; background: #fff; border-bottom: 1px solid #e5e7eb; font-size: 10px; color: #6b7280; }
    .health .h-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .health .label { text-transform: uppercase; letter-spacing: 0.4px; font-size: 9px; }
    .pill { padding: 2px 6px; border-radius: 10px; background: #e5e7eb; font-size: 10px; font-weight: 500; color: #1f2937; min-width: 32px; text-align: center; }
    .pill.ok { background: #c7f7d4; color: #047857; }
    .pill.err { background: #fee2e2; color: #b91c1c; }
    .pill.warn { background: #fef3c7; color: #b45309; }

    .test-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
    .test-row .result { font-size: 11px; color: #6b7280; }
    .btn-secondary {
      padding: 5px 10px;
      background: #e5e7eb;
      color: #1f2937;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
    }
    .btn-secondary:hover { background: #d1d5db; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Mairu</div>
    <div class="status-row">
      <div id="status-dot" class="dot"></div>
      <span id="native-label">connecting…</span>
      <button id="dev-mode-btn" title="Open Dev Dashboard" style="background: none; border: none; cursor: pointer; padding: 0; margin-left: 8px; color: #6b7280;">⚙️</button>
    </div>
  </div>

  <div class="health" aria-label="Health">
    <div class="h-cell"><span class="label">SW</span><span id="h-sw" class="pill">–</span></div>
    <div class="h-cell"><span class="label">WASM</span><span id="h-wasm" class="pill">–</span></div>
    <div class="h-cell"><span class="label">Native</span><span id="h-native" class="pill">–</span></div>
    <div class="h-cell"><span class="label">Queue</span><span id="h-queue" class="pill">0</span></div>
    <div class="h-cell"><span class="label">Synced</span><span id="h-last" class="pill">–</span></div>
  </div>

  <div class="section">
    <div class="stat-grid">
      <div class="stat-card">
        <div id="page-count" class="num">—</div>
        <div class="lbl">Pages</div>
      </div>
      <div class="stat-card">
        <div id="pending-count" class="num">—</div>
        <div class="lbl">Pending</div>
      </div>
      <div class="stat-card">
        <div id="session-id" class="num" style="font-size:11px;color:#6b7280;word-break:break-all;">—</div>
        <div class="lbl">Session</div>
      </div>
    </div>
  </div>

  <div class="section">
    <input id="search-input" type="text" placeholder="Search pages…" autocomplete="off" />
    <div id="results-list" class="results-list"></div>
  </div>

  <div class="section">
    <details>
      <summary>Settings</summary>
      <div class="settings-inner">
        <label for="api-url">API URL</label>
        <input id="api-url" type="text" placeholder="http://127.0.0.1:7080" />
        <button id="save-btn" class="btn-save">Save</button>
      </div>
      <div class="test-row">
        <button id="test-btn" class="btn-secondary">Test connection</button>
        <span id="test-result" class="result"></span>
      </div>
    </details>
  </div>

  <div class="actions">
    <button id="sync-btn" class="btn-sync">Force Sync</button>
  </div>

  <div id="toast" class="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
