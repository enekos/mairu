<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 15px; margin: 0; background-color: #f9fafb; color: #111827; }
      h3 { margin-top: 0; font-size: 16px; margin-bottom: 12px; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; }
      .stat { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
      .stat-label { font-weight: 500; color: #4b5563; }
      .stat-value { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 12px;}
      .status-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
      .status-ok { background-color: #10b981; }
      .status-error { background-color: #ef4444; }
      #sync-btn { margin-top: 15px; width: 100%; padding: 8px; background-color: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; }
      #sync-btn:hover { background-color: #1d4ed8; }
      .footer { margin-top: 15px; font-size: 11px; color: #6b7280; text-align: center; }
    </style>
  </head>
  <body>
    <h3><span id="status-dot" class="status-indicator status-ok"></span>Mairu Browser Context</h3>
    <div id="stats-container">
      <div class="stat">
        <span class="stat-label">Session ID:</span>
        <span class="stat-value" id="session-id">Loading...</span>
      </div>
      <div class="stat">
        <span class="stat-label">Pages Captured:</span>
        <span class="stat-value" id="page-count">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Pending Sync:</span>
        <span class="stat-value" id="pending-count">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Native Host:</span>
        <span class="stat-value" id="native-status">Unknown</span>
      </div>
    </div>
    <button id="sync-btn">Force Sync</button>
    <div class="footer">Real-time context for Mairu Agent</div>
    <script src="popup.js"></script>
  </body>
</html>
