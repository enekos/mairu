<!DOCTYPE html>
<html>
<head>
    <title>Icons and SVGs</title>
</head>
<body>
    <p>Click the home icon:</p>
    <svg aria-label="Home Icon"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    
    <p>Or the settings icon:</p>
    <svg><title>Settings Icon</title><circle cx="50" cy="50" r="40" /></svg>
    
    <p>An empty SVG with no label should be ignored:</p>
    <svg><rect width="100" height="100" /></svg>

    <p>Icons in text: <i class="fas fa-home" aria-label="Home"></i> / <span class="icon" title="Menu"></span></p>
</body>
</html>
