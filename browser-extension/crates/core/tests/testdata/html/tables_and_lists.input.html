<!DOCTYPE html>
<html>
<head>
    <title>Tables and Lists</title>
</head>
<body>
    <h1>Data structures</h1>
    
    <h2>Shopping List</h2>
    <ul>
        <li>Apples</li>
        <li>Bananas</li>
        <li>Cherries</li>
    </ul>

    <h2>Steps</h2>
    <ol>
        <li>Wake up</li>
        <li>Drink coffee</li>
        <li>Write code</li>
    </ol>

    <h2>User Database</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Role</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Alice</td>
                <td>Admin</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Bob</td>
                <td>User</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
