<!DOCTYPE html>
<html lang="en">
<head>
    <meta charSet="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="preload" href="/_next/static/css/app.css" as="style"/>
    <title>Next.js Dashboard App</title>
    <meta name="description" content="A typical Next.js app"/>
</head>
<body>
    <div id="__next">
        <div class="flex h-screen flex-col md:flex-row md:overflow-hidden">
            <div class="w-full flex-none md:w-64">
                <!-- Sidebar navigation -->
                <div class="flex h-full flex-col px-3 py-4 md:px-2">
                    <a class="mb-2 flex h-20 items-end justify-start rounded-md bg-blue-600 p-4 md:h-40" href="/">
                        <div class="w-32 text-white md:w-40">Acme Corp</div>
                    </a>
                    <div class="flex grow flex-row justify-between space-x-2 md:flex-col md:space-x-0 md:space-y-2">
                        <a href="/dashboard" class="flex h-[48px] grow items-center justify-center gap-2 rounded-md bg-gray-50 p-3 text-sm font-medium hover:bg-sky-100 hover:text-blue-600 md:flex-none md:justify-start md:p-2 md:px-3">
                            <p class="hidden md:block">Home</p>
                        </a>
                        <a href="/dashboard/invoices" class="flex h-[48px] grow items-center justify-center gap-2 rounded-md bg-gray-50 p-3 text-sm font-medium hover:bg-sky-100 hover:text-blue-600 md:flex-none md:justify-start md:p-2 md:px-3">
                            <p class="hidden md:block">Invoices</p>
                        </a>
                    </div>
                </div>
            </div>
            <div class="flex-grow p-6 md:overflow-y-auto md:p-12">
                <main>
                    <h1 class="mb-4 text-xl md:text-2xl">Dashboard</h1>
                    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
                        <div class="rounded-xl bg-gray-50 p-2 shadow-sm">
                            <div class="flex p-4">
                                <h3 class="ml-2 text-sm font-medium">Collected</h3>
                            </div>
                            <p class="truncate rounded-xl bg-white px-4 py-8 text-center text-2xl">$12,000</p>
                        </div>
                    </div>
                    <div class="mt-6 grid grid-cols-1 gap-6 md:grid-cols-4 lg:grid-cols-8">
                        <div class="w-full md:col-span-4">
                            <h2 class="mb-4 text-xl md:text-2xl">Recent Invoices</h2>
                            <div class="flex grow flex-col justify-between rounded-xl bg-gray-50 p-4">
                                <div class="bg-white px-6">
                                    <div class="flex flex-row items-center justify-between py-4">
                                        <div class="flex items-center">
                                            <div class="min-w-0">
                                                <p class="truncate text-sm font-semibold md:text-base">Michael Novotny</p>
                                                <p class="hidden text-sm text-gray-500 sm:block">michael@novotny.com</p>
                                            </div>
                                        </div>
                                        <p class="truncate text-sm font-medium md:text-base">$3,200</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script src="/_next/static/chunks/main-app.js"></script>
</body>
</html>
