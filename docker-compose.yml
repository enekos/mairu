services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: contextfs-meili
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: "contextfs-dev-key"
      MEILI_ENV: "development"
    volumes:
      - meili_data:/meili_data

  ollama:
    image: ollama/ollama:latest
    container_name: contextfs-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/localhost/11434"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-pull:
    image: ollama/ollama:latest
    container_name: contextfs-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["sh", "-c", "ollama pull nomic-embed-text"]
    environment:
      OLLAMA_HOST: http://ollama:11434

volumes:
  meili_data:
    driver: local
  ollama_data:
    driver: local
