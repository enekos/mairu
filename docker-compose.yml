services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: contextfs-meili
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: "contextfs-dev-key"
      MEILI_ENV: "development"
    volumes:
      - meili_data:/meili_data
      
  postgres:
    image: postgres:15
    container_name: contextfs-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mairu
      POSTGRES_PASSWORD: mairupassword
      POSTGRES_DB: mairudb
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  meili_data:
    driver: local
  pg_data:
    driver: local
